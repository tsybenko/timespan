name: "Unit Testing"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: "8.4"
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress --no-interaction --optimize-autoloader
      - name: Run PHPUnit
        run: vendor/bin/phpunit tests/ --no-interaction
